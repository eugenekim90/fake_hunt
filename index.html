<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
  />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Fake Hunt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hud">
    <div id="score-panel">
      <div class="label">KILLS</div>
      <div id="kills">0</div>
    </div>
    <div id="room-chip" class="hidden"></div>
    <div id="toast"></div>
    <div id="leaderboard">
      <div class="lb-title">LEADERBOARD</div>
      <ol id="lb-list"></ol>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div id="overlay">
    <div class="card">
      <h1 id="overlay-title">Fake Hunt</h1>
      <p id="overlay-msg">
        Move toward your finger · Double-tap to swing<br />
        Only strike real hunters. Hitting a dummy kills you.
      </p>

      <label class="field-label" for="name-input">Your name</label>
      <input id="name-input" type="text" maxlength="14" placeholder="NAME" autocomplete="username" spellcheck="false" />

      <div class="btn-col">
        <button id="start-btn" type="button">Open World</button>
        <button id="create-room-btn" type="button" class="btn-secondary">Create Private Room</button>
      </div>

      <div class="settings" id="private-settings">
        <div class="setting-row">
          <label for="dummy-count">Dummies</label>
          <input id="dummy-count" type="number" min="5" max="80" value="20" />
        </div>
        <div class="setting-row">
          <label for="human-bot-count">Human bots</label>
          <input id="human-bot-count" type="number" min="2" max="30" value="6" />
        </div>
      </div>

      <div class="join-row">
        <input id="room-input" type="text" maxlength="6" placeholder="ROOM" autocomplete="off" spellcheck="false" />
        <button id="join-room-btn" type="button" class="btn-secondary">Join</button>
      </div>
      <p id="net-status" class="net-status"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="net.js"></script>
  <script src="game.js"></script>
</body>
</html>
